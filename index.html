<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Bravo Mod Menu - ESP Real Time</title>
    <style>
        :root {
            --shopee-orange: #ff4500;
            --bg-dark: #05070c;
            --panel-bg: #0f1322;
            --text-color: #ffffff;
            --esp-color: #00ff66; /* Verde Neon para o ESP */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; user-select: none; }
        body { background-color: var(--bg-dark); color: var(--text-color); min-height: 100vh; overflow: hidden; position: relative; }

        /* ====== TELA DE LOGIN ====== */
        .login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; justify-content: center; align-items: center; z-index: 10000;
        }
        .login-box { width: 100%; max-width: 340px; padding: 2rem; text-align: center; }
        .login-box h1 { color: var(--shopee-orange); font-size: 1.6rem; margin-bottom: 2rem; font-weight: 800; }
        .input-group { margin-bottom: 1.2rem; text-align: left; }
        .input-group label { display: block; font-size: 0.75rem; color: #64748b; margin-bottom: 4px; }
        .input-group input { width: 100%; padding: 0.8rem; background: #0c0d14; border: 1px solid #1f2438; border-radius: 10px; color: #fff; }
        .btn-login { width: 100%; padding: 0.9rem; background: var(--shopee-orange); border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; }
        .status-msg { margin-top: 1rem; font-family: monospace; font-size: 0.85rem; color: #00ff66; }

        /* ====== BOLINHA FLUTUANTE ARRASTÁVEL ====== */
        .floating-btn {
            position: fixed; top: 100px; left: 20px; width: 60px; height: 60px;
            background-color: var(--shopee-orange); border-radius: 50%;
            box-shadow: 0 0 15px rgba(238, 77, 45, 0.6); border: 2px solid #fff;
            cursor: move; display: none; overflow: hidden; z-index: 9999;
            touch-action: none;
        }
        .floating-btn img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }

        /* ====== PAINEL DE CONTROLE ====== */
        .main-panel {
            position: fixed; top: 30px; left: 30px;
            width: 280px; background: var(--panel-bg);
            border: 2px solid var(--shopee-orange); border-radius: 12px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8); display: none; z-index: 9998;
        }
        .panel-header { background: #090c16; padding: 0.6rem 1rem; display: flex; justify-content: space-between; align-items: center; }
        .panel-header h2 { font-size: 1rem; color: var(--shopee-orange); }
        .btn-close { background: #ff3333; border: none; color: white; width: 20px; height: 20px; border-radius: 50%; cursor: pointer; font-size: 0.7rem; }
        
        .panel-body { padding: 1rem; display: flex; flex-direction: column; gap: 0.8rem; }
        .menu-item { display: flex; justify-content: space-between; align-items: center; background: #090b14; padding: 0.6rem 0.8rem; border-radius: 8px; }
        .menu-item span { font-size: 0.8rem; }

        /* Switch Toggle */
        .switch { position: relative; display: inline-block; width: 36px; height: 20px; }
        .switch input { display: none; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #242b42; transition: .3s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 4px; bottom: 4px; background-color: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--shopee-orange); }
        input:checked + .slider:before { transform: translateX(16px); }

        /* ====== RENDERIZADOR REAL DO ESP (TELA DO JOGO SIMULADA) ====== */
        .esp-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; /* Deixa clicar através do ESP */
            z-index: 5000;
            display: none;
        }
        /* Elementos visuais do ESP */
        .esp-box {
            position: absolute; border: 2px solid var(--esp-color);
            box-shadow: 0 0 8px var(--esp-color); display: none;
        }
        .esp-line {
            position: absolute; background-color: var(--esp-color);
            width: 2px; transform-origin: top center; display: none;
        }
        .esp-text {
            position: absolute; color: var(--esp-color); font-size: 11px;
            font-weight: bold; font-family: monospace; white-space: nowrap;
            top: -18px; left: 0; text-shadow: 1px 1px #000;
        }
    </style>
</head>
<body>

    <!-- 1. TELA DE LOGIN -->
    <div class="login-screen" id="loginScreen">
        <div class="login-box">
            <h1>BRAVO VIP LOGIN</h1>
            <div class="input-group">
                <label>Usuário</label>
                <input type="text" id="userInput" placeholder="Shopeev1" value="Shopeev1">
            </div>
            <div class="input-group">
                <label>Senha</label>
                <input type="password" id="passInput" placeholder="••••••••" value="Shopee77x">
            </div>
            <button class="btn-login" onclick="autenticar()">Entrar no Painel</button>
            <div class="status-msg" id="statusMessage"></div>
        </div>
    </div>

    <!-- 2. BOTÃO FLUTUANTE ARRASTÁVEL -->
    <div class="floating-btn" id="floatBtn">
        <img src="https://githubusercontent.com" alt="Icon">
    </div>

    <!-- 3. MENU DE SELEÇÃO ESP -->
    <div class="main-panel" id="mainMenu">
        <div class="panel-header">
            <h2>BRAVO ESP CONTROL</h2>
            <button class="btn-close" onclick="fecharEApagarTudo()">X</button>
        </div>
        <div class="panel-body">
            <div class="menu-item">
                <span>📏 Ativar ESP Linhas</span>
                <label class="switch"><input type="checkbox" id="toggleLines" onchange="atualizarESP()"><span class="slider"></span></label>
            </div>
            <div class="menu-item">
                <span>📦 Ativar ESP Caixas</span>
                <label class="switch"><input type="checkbox" id="toggleBoxes" onchange="atualizarESP()"><span class="slider"></span></label>
            </div>
        </div>
    </div>

    <!-- 4. CAMADA DO ESP FUNCIONAL (RENDERIZADOR) -->
    <div class="esp-container" id="espLayer">
        <!-- Inimigo Simulado 1 -->
        <div class="esp-box" id="box1" style="top: 30%; left: 40%; width: 80px; height: 140px;">
            <div class="esp-text">INIMIGO_01 [14m] - HP: 100</div>
        </div>
        <div class="esp-line" id="line1"></div>

        <!-- Inimigo Simulado 2 -->
        <div class="esp-box" id="box2" style="top: 45%; left: 70%; width: 60px; height: 100px;">
            <div class="esp-text">INIMIGO_02 [42m] - HP: 74</div>
        </div>
        <div class="esp-line" id="line2"></div>
    </div>

    <script>
        const CREDENCIAIS = { user: "Shopeev1", pass: "Shopee77x" };

        function autenticar() {
            const u = document.getElementById('userInput').value;
            const p = document.getElementById('passInput').value;
            const msg = document.getElementById('statusMessage');

            if (u === CREDENCIAIS.user && p === CREDENCIAIS.pass) {
                msg.innerText = "Injetando chaves...";
                setTimeout(() => {
                    document.getElementById('loginScreen').style.display = 'none';
                    document.getElementById('floatBtn').style.display = 'block';
                    document.getElementById('espLayer').style.display = 'block';
                    calcularLinhasDoESP(); // Calcula as posições iniciais das linhas
                }, 1500);
            } else {
                msg.style.color = "red";
                msg.innerText = "Acesso negado.";
            }
        }

        // Liga e desliga as linhas ou caixas baseado nos Switches marcados
        function atualizarESP() {
            const linesActive = document.getElementById('toggleLines').checked;
            const boxesActive = document.getElementById('toggleBoxes').checked;

            document.getElementById('box1').style.display = boxesActive ? 'block' : 'none';
            document.getElementById('box2').style.display = boxesActive ? 'block' : 'none';
            document.getElementById('line1').style.display = linesActive ? 'block' : 'none';
            document.getElementById('line2').style.display = linesActive ? 'block' : 'none';
            
            if (linesActive) calcularLinhasDoESP();
        }

        // Função matemática pura que desenha a linha saindo do centro do topo até o "inimigo"
        function calcularLinhasDoESP() {
            desenharLinhaDeAntena('line1', 'box1');
            desenharLinhaDeAntena('line2', 'box2');
        }

        function desenharLinhaDeAntena(idLinha, idAlvo) {
            const linha = document.getElementById(idLinha);
            const alvo = document.getElementById(idAlvo);
            const rect = alvo.getBoundingClientRect();

            // Ponto de origem da antena: Centro superior da tela
            const xOrigem = window.innerWidth / 2;
            const yOrigem = 0;

            // Ponto de destino da antena: Cabeça do inimigo (topo da caixa)
            const xDestino = rect.left + (rect.width / 2);
            const yDestino = rect.top;

            // Teorema de Pitágoras para obter o tamanho exato da linha visual
            const distancia = Math.hypot(xDestino - xOrigem, yDestino - yOrigem);
            const angulo = Math.atan2(xDestino - xOrigem, yOrigem - yDestino) * (180 / Math.PI);

            linha.style.height = distancia + 'px';
            linha.style.left = xOrigem + 'px';
            linha.style.top = yOrigem + 'px';
            linha.style.transform = `rotate(${angulo}deg)`;
        }

        // Reajusta as linhas caso você mude o celular deitado/em pé
        window.addEventListener('resize', calcularLinhasDoESP);

        // FECHAR TUDO (Botão X)
        function fecharEApagarTudo() {
            document.getElementById('mainMenu').style.display = 'none';
            document.getElementById('floatBtn').style.display = 'none';
            document.getElementById('espLayer').style.display = 'none';
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('statusMessage').innerText = "";
            document.getElementById('toggleLines').checked = false;
            document.getElementById('toggleBoxes').checked = false;
        }

        // ====== ENGINE DE ARRASTO DA BOLINHA CORRIGIDO ======
        const btn = document.getElementById('floatBtn');
        let dragging = false, sX, sY, iX, iY, moved = false;

        btn.addEventListener('mousedown', start);
        btn.addEventListener('touchstart', start, { passive: true });

        function start(e) {
            dragging = true; moved = false;
            const cX = e.touches ? e.touches[0].clientX : e.clientX;
            const cY = e.touches ? e.touches[0].clientY : e.clientY;
            sX = cX; sY = cY;
            const r = btn.getBoundingClientRect();
            iX = r.left; iY = r.top;

            document.addEventListener('mousemove', move);
            document.addEventListener('touchmove', move, { passive: false });
            document.addEventListener('mouseup', end);
            document.addEventListener('touchend', end);
        }

        function move(e) {
            if (!dragging) return;
            if (e.cancelable) e.preventDefault();
            const cX = e.touches ? e.touches[0].clientX : e.clientX;
            const cY = e.touches ? e.touches[0].clientY : e.clientY;
            
            let dX = cX - sX;
            let dY = cY - sY;
            if (Math.abs(dX) > 5 || Math.abs(dY) > 5) moved = true;

            btn.style.left = (iX + dX) + 'px';
            btn.style.top = (iY + dY) + 'px';
        }

        function end() {
            dragging = false;
            document.removeEventListener('mousemove', move);
            document.removeEventListener('touchmove', move);
            
            // Corrigido: Clicar abre/fecha sem bugar ou sumir sozinho
            if (!moved) {
                const menu = document.getElementById('mainMenu');
                menu.style.display = (menu.style.display === 'block') ? 'none' : 'block';
            }
        }
    </script>
</body>
</html>
